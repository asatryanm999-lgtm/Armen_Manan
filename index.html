<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Արմեն & Մանան</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+Armenian:wght@100;400;700&display=swap');

        body, html { margin: 0; padding: 0; font-family: 'Noto Sans Armenian', sans-serif; background: #fff; color: #000; overflow-x: hidden; width: 100%; scroll-behavior: smooth; }
        .section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; box-sizing: border-box; width: 100%; position: relative; }
        
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('couple1.jpg'); 
            background-size: cover; background-position: center; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        
        .hero-content { display: flex; align-items: center; justify-content: space-between; width: 90%; max-width: 400px; }

        .big-date { 
            font-size: 4.5rem; font-weight: 800; line-height: 0.9; text-align: left; 
            transform: translateX(-150%); animation: dateIn 1.2s forwards ease-out;
        }

        .sliding-names { 
            font-family: 'Dancing Script', cursive; font-size: 3rem; text-align: right; 
            transform: translateX(150%); animation: namesIn 1.2s forwards ease-out;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.5);
        }

        @keyframes dateIn { to { transform: translateX(0); } }
        @keyframes namesIn { to { transform: translateX(0); } }

        .music-area { padding: 40px 0; text-align: center; }
        .m-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #000; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .m-text { margin-top: 10px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }

        .timer-grid { display: flex; gap: 8px; justify-content: center; margin-top: 30px; }
        .t-item { background: #f9f9f9; padding: 15px 5px; border-radius: 15px; flex: 1; border: 1px solid #eee; }
        .t-val { font-size: 1.8rem; font-weight: 800; display: block; }
        .t-unit { font-size: 0.7rem; color: #888; }
    </style>
</head>
<body>
    <section class="section hero">
        <div class="hero-content">
            <div class="big-date">16.<br>10.<br>26</div>
            <div class="sliding-names">Արմեն &<br>Մանան</div>
        </div>
    </section>

    <div class="music-area">
        <button class="m-btn" onclick="playM()"><i class="fas fa-play" id="m-icon"></i></button>
        <p class="m-text">Միացնել երաժշտությունը</p>
        <audio id="track" src="music.mp3" loop></audio>
    </div>

    <section class="section" data-aos="fade-up">
        <h2 style="font-size: 2.2rem; font-weight: 700;">Սիրե՜լի Հարազատներ</h2>
        <p style="font-size: 1.2rem; color: #444;">Հրավիրում ենք ձեզ ամենասպասված օրվան՝մեր հարսանիքին</p>
        
        <div class="timer-grid">
            <div class="t-item"><span class="t-val" id="days">00</span><span class="t-unit">ՕՐ</span></div>
            <div class="t-item"><span class="t-val" id="hours">00</span><span class="t-unit">ԺԱՄ</span></div>
            <div class="t-item"><span class="t-val" id="mins">00</span><span class="t-unit">ՐՈՊԵ</span></div>
            <div class="t-item"><span class="t-val" id="secs">00</span><span class="t-unit">ՎՐԿ.</span></div>
        </div>
    </section>
<section class="section">
        <div id="rBox" style="position: relative; width: 100%; max-width: 360px; height: 800px; margin: 0 auto;">
            <i class="fas fa-map-marker-alt" id="pin" style="position: absolute; font-size: 2rem; z-index: 10; color: #000;"></i>
            <svg viewBox="0 0 360 800" style="width:100%; height:100%;">
                <path id="pathLine" d="M180,0 C340,150 340,300 180,400 C20,500 20,650 180,800" fill="none" stroke="#f0f0f0" stroke-width="2" stroke-dasharray="8,8"/>
            </svg>
            <div style="position: absolute; top: 80px; left: 10px; text-align: right; width: 120px;"><b>11:00</b><br>Փեսայի տուն</div>
            <div style="position: absolute; top: 280px; right: 10px; text-align: left; width: 120px;"><b>12:00</b><br>Հարսի տուն</div>
            <div style="position: absolute; top: 480px; left: 10px; text-align: right; width: 120px;"><b>14:00</b><br>Եկեղեցի</div>
            <div style="position: absolute; top: 680px; right: 10px; text-align: left; width: 120px;"><b>17:30</b><br>Ռեստորան</div>
        </div>
    </section>

    <section class="section">
        <div class="rsvp-container" data-aos="fade-up" style="background:#fff; padding:30px; border-radius:30px; width:100%; max-width:380px; box-shadow:0 10px 40px rgba(0,0,0,0.05); border:1px solid #f0f0f0;">
            <h2 style="font-family:'Dancing Script', cursive; font-size:4rem;">RSVP</h2>
            <p style="margin-bottom:20px;">Խնդրում ենք հաստատել ձեր մասնակցությունը</p>
            <form id="rsvpForm">
                <input type="text" placeholder="Անուն Ազգանուն" required style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #eee; box-sizing:border-box;">
                <select required style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #eee;">
                    <option value="">Կմասնակցե՞ք</option>
                    <option>Այո, կգամ</option>
                    <option>Ոչ, չեմ կարող</option>
                </select>
                <div style="text-align:left; margin:10px 0;">Ու՞մ կողմից եք.</div>
                <div style="display:flex; justify-content:space-around; margin-bottom:15px;">
                    <label><input type="radio" name="side" value="groom"> Փեսայի</label>
                    <label><input type="radio" name="side" value="bride"> Հարսի</label>
                </div>
                <input type="number" placeholder="Հյուրերի քանակ" style="width:100%; padding:15px; margin-bottom:15px; border-radius:15px; border:1px solid #eee; box-sizing:border-box;">
                <button type="submit" style="width:100%; padding:18px; background:#000; color:#fff; border:none; border-radius:40px; font-weight:700;">ՈՒՂԱՐԿԵԼ</button>
            </form>
        </div>
    </section>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        
        function playM() {
            const t = document.getElementById('track'), i = document.getElementById('m-icon');
            if (t.paused) { t.play(); i.className = 'fas fa-pause'; } 
            else { t.pause(); i.className = 'fas fa-play'; }
        }

        window.addEventListener('scroll', () => {
            const b = document.getElementById('rBox'), p = document.getElementById('pin');
            const l = document.getElementById('pathLine'), r = b.getBoundingClientRect();
            let s = (window.innerHeight / 2 - r.top) / r.height;
            s = Math.max(0, Math.min(1, s));
            const len = l.getTotalLength(), pt = l.getPointAtLength(s * len);
            p.style.left = (pt.x - 15) + 'px'; 
            p.style.top = (pt.y - 30) + 'px';
        });

        const target = new Date("October 16, 2026 14:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime(), d = target - now;
            document.getElementById("days").innerText = Math.floor(d / 86400000);
            document.getElementById("hours").innerText = Math.floor((d % 86400000) / 3600000);
            document.getElementById("mins").innerText = Math.floor((d % 3600000) / 60000);
            document.getElementById("secs").innerText = Math.floor((d % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
